<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(to top,#000,#0000009a,#000),url('https://i.pinimg.com/1200x/ec/d4/ec/ecd4ecdd97e1d457f7abb7dd21a38473.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #000;
        }

        /* 1. Moving Grid Layer */
        body::before {
            content: "";
            position: fixed;
            top: -50px;
            left: -50px;
            width: calc(100% + 50px);
            height: calc(100% + 50px);
            background-image: linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 10s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        /* 2. Moving Scanline Effect */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 3;
            background: linear-gradient(0deg,rgba(0, 0, 0, 0) 0%,rgba(255, 255, 255, 0.03) 50%,rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            animation: scanline 6s linear infinite;
            pointer-events: none;
        }

        /* 3. Static CRT Flicker/Grain (Optional) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 120%);
            z-index: 2;
            pointer-events: none;
        }

        @keyframes moveGrid {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            80% { bottom: 100%; } /* Stays at top for a moment */
            100% { bottom: -10%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="overlay"></div>
    
    </body>
</html>
