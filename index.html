<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hour Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            /* Your Custom Sunset Palette */
            --bg-gradient: linear-gradient(135deg, #EA6113 0%, #F88F22 35%, #FBB931 70%, #FFE3B3 100%);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent: #FBB931;
        }

        .light-mode {
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #222;
            --text-dim: #444;
            --accent: #EA6113;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex; color: var(--text-main);
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px; background: var(--glass-bg);
            backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border);
            padding: 30px; display: flex; flex-direction: column; z-index: 100;
        }

        .logo { font-size: 1.4rem; font-weight: 800; margin-bottom: 40px; color: var(--accent); }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { padding: 12px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: var(--text-dim); }
        .sidebar li.active { background: rgba(255,255,255,0.1); color: var(--text-main); font-weight: 600; }

        /* --- Main Content --- */
        .main-content { flex: 1; padding: 30px 50px; overflow-y: auto; }

        /* --- New Header Elements --- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; gap: 20px;
        }

        .search-container {
            flex: 1; max-width: 400px; position: relative;
        }

        .search-bar {
            width: 100%; padding: 12px 20px; border-radius: 15px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: white; outline: none; backdrop-filter: blur(10px);
        }

        .user-profile {
            display: flex; align-items: center; gap: 15px;
            background: var(--glass-bg); padding: 8px 15px;
            border-radius: 50px; border: 1px solid var(--glass-border);
        }

        .avatar {
            width: 35px; height: 35px; border-radius: 50%;
            background: var(--accent); border: 2px solid white;
        }

        /* --- Dashboard Grid --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-bottom: 25px; }
        .card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); padding: 25px;
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .chart-container { height: 260px; width: 100%; }

        /* --- Buttons --- */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            background: var(--accent); color: #000; border: none;
            padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold;
        }
        .btn-export { background: rgba(255,255,255,0.15); color: white; border: 1px solid var(--glass-border); }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">IIITG.PRO</div>
        <ul>
            <li class="active">Overview</li>
            <li>Analytics</li>
            <li>Project Assets</li>
            <li>Messages</li>
            <li>Settings</li>
        </ul>
    </aside>

    <main class="main-content" id="report-content">
        <header>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Search projects or data...">
            </div>
            
            <div class="user-profile">
                <div style="text-align: right; line-height: 1.2;">
                    <div style="font-size: 0.9rem; font-weight: bold;">Alex Rivera</div>
                    <small style="color: var(--text-dim); font-size: 0.75rem;">Developer</small>
                </div>
                <div class="avatar"></div>
            </div>
        </header>

        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
            <h1 style="margin: 0;">Analytics Suite</h1>
            <div class="btn-group">
                <button class="btn btn-export" onclick="downloadPDF()">Export PDF</button>
                <button class="btn" onclick="toggleMode()">Switch Theme</button>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Network Traffic</h3>
                <div class="chart-container">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>

            <div class="card" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <h3 style="align-self: flex-start;">User Retention</h3>
                <h2 style="font-size: 5.5rem; margin: 20px 0; color: var(--accent);">+84%</h2>
                <p style="color: var(--text-dim);">Compared to previous quarter</p>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top: 0;">System Overview</h3>
            <p style="color: var(--text-dim); font-size: 0.9rem;">All nodes in <strong>Guwahati</strong> and <strong>Delhi</strong> are operational.</p>
        </div>
    </main>

    <script>
        // Chart.js Setup
        const ctx = document.getElementById('lineChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Active Users',
                    data: [2500, 3200, 2800, 4500, 4100, 5600],
                    borderColor: '#FBB931',
                    backgroundColor: 'rgba(251, 185, 49, 0.15)',
                    borderWidth: 4,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#EA6113'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)' } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } }
                }
            }
        });

        function toggleMode() {
            document.body.classList.toggle('light-mode');
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            const opt = {
                margin: 10,
                filename: 'IIITG_Analytics_Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#EA6113' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
